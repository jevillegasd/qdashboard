<!DOCTYPE html>
<!--
QDashboard - Embedded Report Template
Lightweight iframe-friendly view (no sidebar). Used by /experiment_report_page/{id}.
Includes qibocal CLI action buttons and Plotly rerender logic from latest_report.html.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QDashboard - Report</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #fff;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: .88rem;
            margin: 0;
            padding: 0;
        }
        .report-action-bar {
            position: sticky;
            top: 0;
            z-index: 200;
            background: #2c2c2c;
            padding: .3rem .65rem;
            border-bottom: 1px solid #444;
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .report-action-bar .report-path-text {
            font-size: .7rem;
            color: #999;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .report-action-bar .btn { font-size: .75rem; padding: .2rem .45rem; }
        #qibocal-status { font-size: .8rem; }
        #qibocal-status .alert { margin: 0; border-radius: 0; padding: .3rem .75rem; }
        .report-body-content { padding: .5rem; }
    </style>
    {% if report_head_content %}
        {{ report_head_content | safe }}
    {% endif %}
</head>
<body>

    <!-- Qibocal CLI action bar -->
    {% if report_path_for_link %}
    <div class="report-action-bar">
        <span class="report-path-text" title="{{ report_path_for_link }}">
            <i class="fas fa-folder-open mr-1"></i>{{ report_path_for_link }}
        </span>
        <div class="btn-group btn-group-sm" role="group">
            <button type="button" class="btn btn-outline-secondary qibocal-btn play-experiment-btn"
                    data-path="{{ report_path_for_link }}"
                    title="Repeat Experiment">
                <i class="fas fa-play"></i>
            </button>
            <button type="button" class="btn btn-outline-primary qibocal-action qibocal-btn"
                    data-action="fit" data-path="{{ report_path_for_link }}"
                    {% if not qibocal_available %}disabled{% endif %}
                    title="{% if qibocal_available %}Re-run Fit (qq fit){% else %}Qibocal not installed{% endif %}">
                <i class="fas fa-chart-line"></i>
            </button>
            <button type="button" class="btn btn-outline-success qibocal-action qibocal-btn"
                    data-action="report" data-path="{{ report_path_for_link }}"
                    {% if not qibocal_available %}disabled{% endif %}
                    title="{% if qibocal_available %}Re-generate Report (qq report){% else %}Qibocal not installed{% endif %}">
                <i class="fas fa-file-alt"></i>
            </button>
            <button type="button" class="btn btn-outline-warning qibocal-action qibocal-btn"
                    data-action="update" data-path="{{ report_path_for_link }}"
                    {% if not qibocal_available %}disabled{% endif %}
                    title="{% if qibocal_available %}Update Platform (qq update){% else %}Qibocal not installed{% endif %}">
                <i class="fas fa-microchip"></i>
            </button>
        </div>
    </div>
    <div id="qibocal-status" style="display:none;">
        <div class="alert alert-dismissible mb-0" id="qibocal-alert" role="alert">
            <div id="qibocal-message"></div>
            <button type="button" class="close py-1" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>
    </div>
    {% endif %}

    <!-- Report content -->
    <div class="report-body-content">
        {% if report_body_content %}
            {{ report_body_content | safe }}
        {% else %}
            <p class="text-muted text-center p-4"><i class="fas fa-inbox fa-2x d-block mb-2"></i>No report content available.</p>
        {% endif %}
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <script>
    // Initialize tooltips
    $(document).ready(function() {
        $('[title]').tooltip({ placement: 'bottom', trigger: 'hover focus' });
    });

    // Qibocal CLI Actions (mirrors latest_report.html)
    $('.qibocal-action').click(function() {
        var action = $(this).data('action');
        var path = $(this).data('path');
        var button = $(this);
        button.tooltip('hide');
        button.prop('disabled', true);
        button.find('i').removeClass().addClass('fas fa-spinner fa-spin');
        $('#qibocal-status').hide();
        $.ajax({
            url: '/qibocal/' + action,
            method: 'POST',
            data: { 'report_path': path },
            success: function(response) {
                showQibocalStatus(response.message, response.success ? 'success' : 'danger');
                if (response.success && (action === 'report' || action === 'fit')) {
                    setTimeout(function() { location.reload(); }, 2000);
                }
            },
            error: function(xhr) {
                var message = 'Error executing qibocal command';
                if (xhr.responseJSON && xhr.responseJSON.message) { message = xhr.responseJSON.message; }
                showQibocalStatus(message, 'danger');
            },
            complete: function() {
                button.prop('disabled', false);
                var iconMap = { fit: 'fa-chart-line', report: 'fa-file-alt', update: 'fa-microchip' };
                button.find('i').removeClass().addClass('fas ' + (iconMap[action] || 'fa-cog'));
            }
        });
    });

    // Repeat Experiment (mirrors latest_report.html)
    $('.play-experiment-btn').click(function() {
        var path = $(this).data('path');
        var button = $(this);
        button.tooltip('hide');
        button.prop('disabled', true);
        button.find('i').removeClass().addClass('fas fa-spinner fa-spin');
        $('#qibocal-status').hide();
        $.ajax({
            url: '/repeat_experiment',
            method: 'POST',
            data: { 'report_path': path },
            success: function(response) {
                if (response.success) {
                    showQibocalStatus(
                        'Experiment submitted! Job ID: ' + response.job_id,
                        'success');
                } else {
                    showQibocalStatus(response.message, 'danger');
                }
            },
            error: function(xhr) {
                var message = 'Error submitting experiment';
                if (xhr.responseJSON && xhr.responseJSON.message) { message = xhr.responseJSON.message; }
                showQibocalStatus(message, 'danger');
            },
            complete: function() {
                button.prop('disabled', false);
                button.find('i').removeClass().addClass('fas fa-play');
            }
        });
    });

    function showQibocalStatus(message, type) {
        $('#qibocal-message').html(message);
        $('#qibocal-alert').removeClass('alert-success alert-danger alert-warning').addClass('alert-' + type);
        $('#qibocal-status').show();
    }

    // Plotly: force re-render after load (identical to latest_report.html)
    $(document).ready(function() {
        var plotElements = $('div[id^="plotly"], .plotly-graph-div, .js-plotly-plot, .plotly');
        setTimeout(function() {
            if (typeof Plotly !== 'undefined') {
                plotElements.each(function() {
                    try {
                        if (this._fullLayout) {
                            Plotly.redraw(this);
                        } else if (this._fullData) {
                            Plotly.newPlot(this, this._fullData, this._fullLayout, this._fullConfig);
                        }
                    } catch (e) {}
                });
            } else {
                plotElements.each(function() {
                    $(this).find('script').each(function() {
                        try { eval(this.innerHTML); } catch (e) {}
                    });
                });
            }
        }, 500);

        $(window).resize(function() {
            if (typeof Plotly !== 'undefined') {
                plotElements.each(function() {
                    try { Plotly.Plots.resize(this); } catch (e) {}
                });
            }
        });
    });
    </script>
</body>
</html>
